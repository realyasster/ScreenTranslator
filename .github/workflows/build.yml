name: Build

on:
  push:
    branches: [master, main]
    tags: ['*']
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qtbase5-dev qttools5-dev-tools qtwebengine5-dev \
            libtesseract-dev libleptonica-dev libhunspell-dev \
            libgl1-mesa-dev libxkbcommon-x11-0 libxcb-cursor0 libxcb-cursor-dev \
            libxcb-keysyms1-dev libxcb-shape0-dev libxcb-shm0-dev \
            libxcb-randr0-dev libxcb-render0-dev libxcb-render-util0-dev \
            libxcb-icccm4-dev libxcb-image0-dev libxcb-util1 libxcb-util-dev

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Cache Qt / native deps
        uses: actions/cache@v4
        with:
          path: deps
          key: ${{ runner.os }}-${{ hashFiles('./share/ci/get_qt.py', './share/ci/get_leptonica.py', './share/ci/get_tesseract.py', './share/ci/get_hunspell.py') }}
          restore-keys: |
            ${{ runner.os }}-

      - name: Generate resources
        if: runner.os == 'Linux'
        run: |
          mkdir -p share/translations
          [ -f share/translations/screentranslator_ru.ts ] || touch share/translations/screentranslator_ru.ts
          [ -f share/translations/screentranslator_he.ts ] || touch share/translations/screentranslator_he.ts
          lrelease share/translations/screentranslator_ru.ts -qm share/translations/screentranslator_ru.qm
          lrelease share/translations/screentranslator_he.ts -qm share/translations/screentranslator_he.qm

      - name: Build (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          qmake screen-translator.pro
          make -j$(nproc)

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          python ./share/ci/get_qt.py
          python ./share/ci/get_qt_ssl.py
          python ./share/ci/get_leptonica.py
          python ./share/ci/get_tesseract.py
          python ./share/ci/get_hunspell.py
          python ./share/ci/build.py
          python ./share/ci/windeploy.py
          artifact=$(python ./share/ci/windeploy.py artifact_name)
          echo "ARTIFACT=${artifact}" >> $GITHUB_ENV

      - name: Upload Linux binary
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: screen-translator-linux
          path: screen-translator

      - name: Upload Windows artifact
        if: runner.os == 'Windows' && env.ARTIFACT != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT }}
          path: ${{ env.ARTIFACT }}

  release:
    name: Publish release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true